<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل Playlist</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .download-btn {
            background: #10b981;
            color: #fff;
            text-decoration: none;
            padding: 16px 35px;
            border-radius: 10px;
            font-size: 20px;
            transition: .3s;
        }

        .download-btn:hover {
            background: #059669;
        }
    </style>
</head>
<body>

<a href="playlist.m3u" download="playlist.m3u" class="download-btn">
📥 تحميل playlist.m3u
</a>

</body>
</html>
